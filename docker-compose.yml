###############################################################################
# Flyx 2.0 - Simplified Container Setup
#
# Just run:  docker compose up -d --build
# Access:    http://localhost
#
# On Linux, use docker-compose.linux.yml override for host networking.
###############################################################################

services:
  flyx:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        - NEXT_PUBLIC_TMDB_API_KEY=${NEXT_PUBLIC_TMDB_API_KEY:-}
    container_name: flyx
    restart: unless-stopped
    ports:
      - "80:3000"
      - "8787:8787"
    env_file:
      - docker/.env
    volumes:
      - flyx-data:/app/data

volumes:
  flyx-data:
    driver: local
